const DEFAULT_CATALOGO = [
  { id:1,  nome:"Boné",               valor:25,  isCarne:false },
  { id:2,  nome:"Camiseta",           valor:45,  isCarne:false },
  { id:3,  nome:"Banner",             valor:80,  isCarne:false },
  { id:4,  nome:"Urna",               valor:120, isCarne:false },
  { id:5,  nome:"Wind Banner",        valor:200, isCarne:false },
  { id:6,  nome:"Totem",              valor:350, isCarne:false },

const { useState, useEffect } = React;

function fmt(v){ return new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v||0); }
function fmtDate(s){ return new Date(s).toLocaleDateString("pt-BR"); }

async function fbGet(path){ const r=await fetch(`${FIREBASE_URL}/${path}.json`); return r.json(); }
async function fbSet(path,data){ await fetch(`${FIREBASE_URL}/${path}.json`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)}); }

const FL0 = {vendedorId:"",itemId:"",itemNome:"",isCarne:false,quantidade:1,valor:"",observacao:""};

function App(){
  const [tab,setTab]               = useState("dashboard");
  const [vendedores,setVendedores] = useState([]);
  const [lancamentos,setLancamentos]= useState([]);
  const [catalogo,setCatalogo]     = useState(DEFAULT_CATALOGO);
  const [syncing,setSyncing]       = useState(false);
  const [lastSync,setLastSync]     = useState(null);
  const [loaded,setLoaded]         = useState(false);

  const [modalV,setModalV]   = useState(false);
  const [modalL,setModalL]   = useState(false);
  const [modalH,setModalH]   = useState(null);
  const [delConf,setDelConf] = useState(null);
  const [editV,setEditV]     = useState(null);
  const [editC,setEditC]     = useState(null);

  const [fv,setFv] = useState({nome:"",verba:""});
  const [fl,setFl] = useState(FL0);
  const [fc,setFc] = useState({nome:"",valor:"",isCarne:false});

  async function loadData(){
    try{
      const d=await fbGet("tmj");
      if(d){
        if(d.vendedores)  setVendedores(d.vendedores);
        if(d.lancamentos) setLancamentos(d.lancamentos);
        if(d.catalogo)    setCatalogo(d.catalogo);
        setLastSync(new Date().toLocaleTimeString("pt-BR"));
      }
    }catch(e){ console.error(e); }
    setLoaded(true);
  }

  async function saveData(v,l,c){
    setSyncing(true);
    try{
      await fbSet("tmj",{vendedores:v,lancamentos:l,catalogo:c});
      setLastSync(new Date().toLocaleTimeString("pt-BR"));
    }catch(e){ alert("Erro ao salvar: "+e.message); }
    setSyncing(false);
  }

  useEffect(()=>{ loadData(); const t=setInterval(loadData,5000); return ()=>clearInterval(t); },[]);

  function getSaldo(id){
    const v=vendedores.find(x=>x.id===id); if(!v) return 0;
    return v.verba - lancamentos.filter(l=>l.vendedorId===id).reduce((a,l)=>a+l.valor*l.quantidade,0);
  }
  function getGasto(id){ return lancamentos.filter(l=>l.vendedorId===id).reduce((a,l)=>a+l.valor*l.quantidade,0); }
  function pct(v,t){ return t>0?Math.min(100,Math.round(v/t*100)):0; }

  function addVendedor(){
    if(!fv.nome.trim()||!fv.verba) return;
    let nv;
    if(editV){ nv=vendedores.map(x=>x.id===editV.id?{...x,nome:fv.nome,verba:parseFloat(fv.verba)}:x); setEditV(null); }
    else { nv=[...vendedores,{id:Date.now(),nome:fv.nome,verba:parseFloat(fv.verba),createdAt:new Date().toISOString()}]; }
    setVendedores(nv); saveData(nv,lancamentos,catalogo);
    setFv({nome:"",verba:""}); setModalV(false);
  }

  function addLancamento(){
    if(!fl.vendedorId||(!fl.itemNome&&!fl.itemId)||!fl.valor) return;
    const nome=fl.itemNome||(catalogo.find(c=>c.id===parseInt(fl.itemId))?.nome||"");
    const nl=[...lancamentos,{
      id:Date.now(), vendedorId:parseInt(fl.vendedorId),
      itemNome:nome, isCarne:fl.isCarne,
      quantidade:parseInt(fl.quantidade), valor:parseFloat(fl.valor),
      observacao:fl.observacao.trim(), data:new Date().toISOString()
    }];
    setLancamentos(nl); saveData(vendedores,nl,catalogo);
    setFl(FL0); setModalL(false);
  }

  function selectCat(itemId){
    const item=catalogo.find(c=>c.id===parseInt(itemId));
    if(!item) return;
    setFl(f=>({...f,
      itemId:String(item.id),
      itemNome:item.nome,
      isCarne:item.isCarne||false,
      valor:item.isCarne?"":String(item.valor)
    }));
  }

  function addCatItem(){
    if(!fc.nome.trim()) return;
    if(!fc.isCarne && !fc.valor) return;
    let nc;
    if(editC){
      nc=catalogo.map(x=>x.id===editC.id?{...x,nome:fc.nome,valor:fc.isCarne?0:parseFloat(fc.valor),isCarne:fc.isCarne}:x);
      setEditC(null);
    } else {
      nc=[...catalogo,{id:Date.now(),nome:fc.nome,valor:fc.isCarne?0:parseFloat(fc.valor),isCarne:fc.isCarne||false}];
    }
    setCatalogo(nc); saveData(vendedores,lancamentos,nc);
    setFc({nome:"",valor:"",isCarne:false});
  }

  function doDelete(){
    let nv=vendedores,nl=lancamentos,nc=catalogo;
    if(delConf.type==="vendedor")   nv=vendedores.filter(x=>x.id!==delConf.id);
    if(delConf.type==="lancamento") nl=lancamentos.filter(x=>x.id!==delConf.id);
    if(delConf.type==="catalogo")   nc=catalogo.filter(x=>x.id!==delConf.id);
    setVendedores(nv); setLancamentos(nl); setCatalogo(nc);
    saveData(nv,nl,nc); setDelConf(null);
  }

  const totalVerba=vendedores.reduce((a,v)=>a+v.verba,0);
  const totalGasto=lancamentos.reduce((a,l)=>a+l.valor*l.quantidade,0);
  const totalCarne=lancamentos.filter(l=>l.isCarne).reduce((a,l)=>a+l.valor*l.quantidade,0);

  const CSS=`
    .nav-tab{background:none;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;font-size:13px;letter-spacing:.06em;text-transform:uppercase;padding:8px 18px;color:rgba(255,255,255,.7);border-radius:4px;transition:all .18s;display:flex;align-items:center;gap:7px}
    .nav-tab:hover{color:#fff;background:rgba(255,255,255,.15)}

    .sec-ttl{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;text-transform:uppercase;color:#006496}
    .sec-line{width:52px;height:4px;background:#D62734;border-radius:2px;margin:6px 0 22px}
    .v-card{background:#fff;border:1px solid #e2e6ea;border-left:5px solid #006496;border-radius:10px;padding:20px 22px;transition:all .18s;box-shadow:0 1px 4px rgba(0,0,0,.05)}
    .v-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.1);transform:translateY(-2px)}
    .v-card.danger{border-left-color:#D62734}
    .saldo-v{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:800;line-height:1}
    .badge-ok{background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9;border-radius:20px;padding:3px 11px;font-size:11px;font-weight:700;white-space:nowrap}
    .badge-warn{background:#ffebee;color:#c62828;border:1px solid #ffcdd2;border-radius:20px;padding:3px 11px;font-size:11px;font-weight:700;white-space:nowrap}
    .badge-carne{background:#fff3e0;color:#e65100;border:1px solid #ffcc80;border-radius:20px;padding:3px 11px;font-size:11px;font-weight:700;white-space:nowrap}
    .stat-card{background:#fff;border-radius:10px;padding:20px 24px;border:1px solid #e2e6ea;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .stat-lbl{font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#888;margin-bottom:6px}
    .stat-val{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800}
    .pbar{background:#e8edf0;border-radius:6px;height:8px;overflow:hidden}
    .pfill{height:100%;border-radius:6px;transition:width .5s ease}
    .l-row{background:#fff;border:1px solid #e8ecef;border-radius:9px;padding:14px 18px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px;transition:box-shadow .15s}
    .l-row:hover{box-shadow:0 3px 12px rgba(0,0,0,.09)}
    .l-row.carne{border-left:4px solid #ff8f00;background:#fffbf5}
    .c-row{background:#fff;border:1px solid #e8ecef;border-radius:9px;padding:13px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:8px}
    .c-row:hover{box-shadow:0 3px 12px rgba(0,0,0,.09)}
    .c-row.carne-item{border-left:4px solid #ff8f00;background:#fffbf5}
    .price-tag{background:#e3f2fd;color:#006496;border:1.5px solid #90caf9;border-radius:5px;padding:4px 12px;font-size:13px;font-weight:800;font-family:'Barlow Condensed',sans-serif;white-space:nowrap}
    .price-tag-carne{background:#fff3e0;color:#e65100;border:1.5px solid #ffcc80;border-radius:5px;padding:4px 12px;font-size:11px;font-weight:700;font-family:'Barlow',sans-serif;white-space:nowrap}
    .h-row{border-bottom:1px solid #f0f0f0;padding:11px 0;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
    .h-row:last-child{border-bottom:none}
    .h-row.carne{background:#fffbf5;border-radius:6px;padding:11px 8px;margin-bottom:4px}
    .obs-box{background:#f8f9fa;border:1px solid #e8ecef;border-radius:5px;padding:6px 10px;font-size:11px;color:#666;font-style:italic;margin-top:4px;line-height:1.4}
    .tot-prev{background:linear-gradient(135deg,#fff3e0,#ffe0b2);border:1.5px solid #ffb74d;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;color:#e65100}
    .carne-alert{background:linear-gradient(135deg,#fff3e0,#fff8f0);border:1.5px solid #ffb74d;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-family:'Barlow',sans-serif;font-size:13px;color:#e65100;display:flex;align-items:center;gap:8px}
    .empty{text-align:center;padding:60px 0;color:#bbb}
    .sync-bar{background:#e3f2fd;border-bottom:1px solid #bbdefb;padding:6px 28px;font-family:'Barlow',sans-serif;font-size:11px;color:#006496;display:flex;align-items:center;gap:8px}
    .toggle-wrap{display:flex;align-items:center;gap:10px;background:#f8f9fa;border:1.5px solid #dde1e5;border-radius:6px;padding:10px 14px;cursor:pointer;transition:all .18s}
    .toggle-wrap:hover{border-color:#006496}
    .toggle-wrap.active-carne{background:#fff3e0;border-color:#ffb74d}
    .toggle-check{width:18px;height:18px;border:2px solid #dde1e5;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
    .toggle-check.checked{background:#D62734;border-color:#D62734}
    @media(max-width:640px){.nav-lab{display:none}}
  `;

  if(!loaded) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,color:"#006496"}}>Carregando dados...</div>;

  return (
    <div style={{minHeight:"100vh",background:"#f4f6f8"}}>
      <style>{CSS}</style>

      {/* HEADER */}
      <div style={{background:"linear-gradient(90deg,#004f78,#006496,#007ab8)",boxShadow:"0 3px 16px rgba(0,0,0,.2)",position:"relative"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:5,background:"#D62734"}}/>
        <div style={{maxWidth:1200,margin:"0 auto",padding:"0 28px",display:"flex",alignItems:"center",justifyContent:"space-between",height:72}}>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <div style={{background:"#fff",borderRadius:9,padding:"5px 10px",height:52,width:90,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 8px rgba(0,0,0,.15)"}}>
              <img src={"data:image/png;base64,"+LOGO} alt="TMJ" style={{height:42,width:"auto",objectFit:"contain"}}/>
            </div>
            <div style={{borderLeft:"2px solid rgba(255,255,255,.25)",paddingLeft:16}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:22,color:"#fff",textTransform:"uppercase",letterSpacing:".08em",lineHeight:1}}>Verba Flex</div>
              <div style={{fontFamily:"'Barlow',sans-serif",fontSize:11,color:"rgba(255,255,255,.6)",letterSpacing:".1em",textTransform:"uppercase",marginTop:2}}>Controle Interno · Frigorífico TMJ</div>
            </div>
          </div>
          <nav style={{display:"flex",gap:4}}>
            {[{id:"dashboard",label:"Dashboard",icon:"⊞"},{id:"vendedores",label:"Vendedores",icon:"◈"},{id:"lancamentos",label:"Lançamentos",icon:"◎"},{id:"catalogo",label:"Catálogo",icon:"◇"}].map(t=>(
              <button key={t.id} className={"nav-tab"+(tab===t.id?" active":"")} onClick={()=>setTab(t.id)}>
                <span>{t.icon}</span><span className="nav-lab">{t.label}</span>
              </button>
            ))}
          </nav>
        </div>
      </div>

      {/* SYNC BAR */}
      <div className="sync-bar">
        {syncing?<span>⟳ Salvando...</span>:<span>✓ Sincronizado{lastSync?" às "+lastSync:""} · Atualiza automaticamente a cada 5s</span>}
      </div>

      <div style={{maxWidth:1200,margin:"0 auto",padding:"32px 28px"}}>

        {/* ── DASHBOARD ── */}
        {tab==="dashboard" && (
          <div>
            <div className="sec-ttl">Painel de Controle</div>
            <div className="sec-line"/>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:32}}>
              {[
                {label:"Total de Verba",   value:fmt(totalVerba),          color:"#006496", accent:"#e3f2fd", icon:"💰"},
                {label:"Total Gasto",      value:fmt(totalGasto),          color:"#D62734", accent:"#ffebee", icon:"🧾"},
                {label:"Bonif. em Carne",  value:fmt(totalCarne),          color:"#e65100", accent:"#fff3e0", icon:"🥩"},
                {label:"Saldo Disponível", value:fmt(totalVerba-totalGasto), color:totalVerba-totalGasto<0?"#D62734":"#2e7d32", accent:totalVerba-totalGasto<0?"#ffebee":"#e8f5e9", icon:"✅"},
              ].map(s=>(
                <div key={s.label} className="stat-card" style={{borderTop:"4px solid "+s.color}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div><div className="stat-lbl">{s.label}</div><div className="stat-val" style={{color:s.color}}>{s.value}</div></div>
                    <div style={{width:44,height:44,background:s.accent,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{s.icon}</div>
                  </div>
                </div>
              ))}
            </div>

            {vendedores.length===0 ? (
              <div className="empty"><div style={{fontSize:56,marginBottom:16,opacity:.4}}>◈</div><div style={{fontSize:14,marginBottom:20}}>Nenhum vendedor cadastrado ainda.</div><button className="btn btn-red" onClick={()=>setTab("vendedores")}>Cadastrar Vendedores</button></div>
            ) : (
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:16}}>
                {vendedores.map(vend=>{
                  const saldo=getSaldo(vend.id), gasto=getGasto(vend.id);
                  const pctG=pct(gasto,vend.verba), danger=saldo<0;
                  const carnVend=lancamentos.filter(l=>l.vendedorId===vend.id&&l.isCarne).reduce((a,l)=>a+l.valor*l.quantidade,0);
                  return (
                    <div key={vend.id} className={"v-card"+(danger?" danger":"")}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                        <div>
                          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:21,textTransform:"uppercase"}}>{vend.nome}</div>
                          <div style={{fontSize:11,color:"#999",marginTop:1}}>Verba: {fmt(vend.verba)}</div>
                        </div>
                        <span className={danger?"badge-warn":"badge-ok"}>{danger?"⚠ Estourado":"● Ativo"}</span>
                      </div>
                      <div style={{background:danger?"#fff5f5":"#f0f7ff",border:"1.5px solid "+(danger?"#ffcdd2":"#bbdefb"),borderRadius:9,padding:"14px 16px",marginBottom:10,textAlign:"center"}}>
                        <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".14em",color:"#999",marginBottom:4}}>Saldo Disponível</div>
                        <div className="saldo-v" style={{color:danger?"#D62734":"#006496"}}>{fmt(saldo)}</div>
                      </div>
                      {carnVend>0&&<div style={{background:"#fff8f0",border:"1px solid #ffcc80",borderRadius:7,padding:"6px 12px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontSize:11,color:"#888"}}>🥩 Bonif. Carne</span>
                        <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:15,color:"#e65100"}}>{fmt(carnVend)}</span>
                      </div>}
                      <div className="pbar" style={{marginBottom:6}}>
                        <div className="pfill" style={{width:pctG+"%",background:pctG>=90?"#D62734":pctG>=70?"#f57c00":"#006496"}}/>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#999"}}>
                        <span>Gasto: {fmt(gasto)}</span>
                        <span style={{fontWeight:700,color:pctG>=90?"#D62734":pctG>=70?"#e65100":"#555"}}>{pctG}%</span>
                      </div>
                      <button className="btn-ob" style={{marginTop:14,width:"100%",fontSize:11}} onClick={()=>setModalH(vend)}>
                        Ver Histórico ({lancamentos.filter(l=>l.vendedorId===vend.id).length} lançamentos)
                      </button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ── VENDEDORES ── */}
        {tab==="vendedores" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div><div className="sec-ttl">Vendedores</div><div className="sec-line"/></div>
              <button className="btn btn-red" style={{marginTop:6}} onClick={()=>{setEditV(null);setFv({nome:"",verba:""});setModalV(true);}}>+ Novo Vendedor</button>
            </div>
            {vendedores.length===0 ? <div className="empty"><div style={{fontSize:56,marginBottom:16,opacity:.4}}>◈</div><div style={{fontSize:14}}>Nenhum vendedor cadastrado.</div></div> : (
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:14}}>
                {vendedores.map(vend=>{
                  const saldo=getSaldo(vend.id), gasto=getGasto(vend.id);
                  return (
                    <div key={vend.id} className="card" style={{padding:"20px 22px",borderLeft:"5px solid "+(saldo<0?"#D62734":"#006496")}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:22,textTransform:"uppercase"}}>{vend.nome}</div>
                        <div style={{display:"flex",gap:8}}>
                          <button className="btn-ob" style={{padding:"5px 12px",fontSize:11}} onClick={()=>{setEditV(vend);setFv({nome:vend.nome,verba:String(vend.verba)});setModalV(true);}}>✏ Editar</button>
                          <button className="btn-del" onClick={()=>setDelConf({type:"vendedor",id:vend.id,label:vend.nome})}>✕</button>
                        </div>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                        {[{l:"Total",v:fmt(vend.verba),c:"#006496",bg:"#e3f2fd"},{l:"Gasto",v:fmt(gasto),c:"#D62734",bg:"#ffebee"},{l:"Saldo",v:fmt(saldo),c:saldo<0?"#D62734":"#2e7d32",bg:saldo<0?"#ffebee":"#e8f5e9"}].map(s=>(
                          <div key={s.l} style={{background:s.bg,borderRadius:7,padding:"10px 12px",textAlign:"center"}}>
                            <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".12em",color:"#888",marginBottom:4}}>{s.l}</div>
                            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:800,color:s.c}}>{s.v}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ── LANCAMENTOS ── */}
        {tab==="lancamentos" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div><div className="sec-ttl">Lançamentos</div><div className="sec-line"/></div>
              <button className="btn btn-red" style={{marginTop:6}} onClick={()=>{setFl(FL0);setModalL(true);}}>+ Novo Lançamento</button>
            </div>
            {lancamentos.length===0 ? <div className="empty"><div style={{fontSize:56,marginBottom:16,opacity:.4}}>◎</div><div style={{fontSize:14}}>Nenhum lançamento registrado.</div></div> : (
              <div>
                {[...lancamentos].reverse().map(lanc=>{
                  const vend=vendedores.find(v=>v.id===lanc.vendedorId);
                  return (
                    <div key={lanc.id} className={"l-row"+(lanc.isCarne?" carne":"")}>
                      <div style={{width:42,height:42,background:lanc.isCarne?"#fff3e0":"#ffebee",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>
                        {lanc.isCarne?"🥩":"🧾"}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:17,textTransform:"uppercase",color:"#006496"}}>{vend?.nome||"—"}</div>
                          {lanc.isCarne&&<span className="badge-carne">🥩 Bonif. Carne</span>}
                        </div>
                        <div style={{fontSize:12,color:"#999",marginTop:2}}>{lanc.itemNome} · {lanc.quantidade}x · {fmtDate(lanc.data)}</div>
                        {lanc.observacao&&<div className="obs-box">📝 {lanc.observacao}</div>}
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:21,fontWeight:800,color:lanc.isCarne?"#e65100":"#D62734"}}>− {fmt(lanc.valor*lanc.quantidade)}</div>
                        <div style={{fontSize:11,color:"#bbb"}}>{fmt(lanc.valor)}/un</div>
                      </div>
                      <button className="btn-del" style={{flexShrink:0}} onClick={()=>setDelConf({type:"lancamento",id:lanc.id,label:(vend?.nome||"")+" – "+lanc.itemNome})}>✕</button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ── CATALOGO ── */}
        {tab==="catalogo" && (
          <div>
            <div className="sec-ttl">Catálogo de Itens</div><div className="sec-line"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:28}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",color:"#888",marginBottom:14}}>Itens disponíveis ({catalogo.length})</div>
                {catalogo.map(item=>(
                  <div key={item.id} className={"c-row"+(item.isCarne?" carne-item":"")}>
                    <div style={{width:38,height:38,background:item.isCarne?"#fff3e0":"#e3f2fd",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
                      {item.isCarne?"🥩":"🏷️"}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:17,textTransform:"uppercase"}}>{item.nome}</div>
                      {item.isCarne&&<div style={{fontSize:10,color:"#e65100",marginTop:1}}>valor variável por lançamento</div>}
                    </div>
                    {item.isCarne
                      ? <span className="price-tag-carne">Variável</span>
                      : <span className="price-tag">{fmt(item.valor)}</span>
                    }
                    <div style={{display:"flex",gap:6}}>
                      <button className="btn-ob" style={{padding:"4px 10px",fontSize:11}} onClick={()=>{setEditC(item);setFc({nome:item.nome,valor:item.isCarne?"":String(item.valor),isCarne:item.isCarne||false});}}>✏</button>
                      <button className="btn-del" onClick={()=>setDelConf({type:"catalogo",id:item.id,label:item.nome})}>✕</button>
                    </div>
                  </div>
                ))}
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",color:"#888",marginBottom:14}}>{editC?"✏ Editar Item":"＋ Adicionar Item"}</div>
                <div className="card" style={{padding:24}}>
                  <div className="mb"><label>Nome do Item</label><input placeholder="Ex: Boné, Camiseta, Banner..." value={fc.nome} onChange={e=>setFc(f=>({...f,nome:e.target.value}))}/></div>

                  {/* Toggle carne */}
                  <div className="mb">
                    <label>Tipo de item</label>
                    <div className={"toggle-wrap"+(fc.isCarne?" active-carne":"")} onClick={()=>setFc(f=>({...f,isCarne:!f.isCarne,valor:""}))}>
                      <div className={"toggle-check"+(fc.isCarne?" checked":"")}>
                        {fc.isCarne&&<span style={{color:"#fff",fontSize:12,fontWeight:900}}>✓</span>}
                      </div>
                      <div>
                        <div style={{fontFamily:"'Barlow',sans-serif",fontSize:13,fontWeight:600,color:fc.isCarne?"#e65100":"#333"}}>
                          {fc.isCarne?"🥩 Bonificação em Carne (valor variável)":"Item com valor fixo"}
                        </div>
                        <div style={{fontSize:11,color:"#999",marginTop:1}}>
                          {fc.isCarne?"O valor será informado a cada lançamento":"Clique para marcar como bonificação em carne"}
                        </div>
                      </div>
                    </div>
                  </div>

                  {!fc.isCarne&&<div className="mb"><label>Valor Unitário (R$)</label><input type="number" step="0.01" placeholder="0,00" value={fc.valor} onChange={e=>setFc(f=>({...f,valor:e.target.value}))}/></div>}

                  <div style={{display:"flex",gap:10}}>
                    <button className="btn btn-red" style={{flex:1}} onClick={addCatItem}>{editC?"Salvar":"Adicionar"}</button>
                    {editC&&<button className="btn-or" onClick={()=>{setEditC(null);setFc({nome:"",valor:"",isCarne:false});}}>Cancelar</button>}
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* ── MODAL Vendedor ── */}
      {modalV&&(
        <div className="modal-backdrop" onClick={()=>setModalV(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-hdr">
              <div style={{width:40,height:40,background:"#e3f2fd",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>◈</div>
              <div className="modal-ttl">{editV?"Editar Vendedor":"Novo Vendedor"}</div>
            </div>
            <div className="mb"><label>Nome do Vendedor</label><input placeholder="Nome completo" value={fv.nome} onChange={e=>setFv(f=>({...f,nome:e.target.value}))}/></div>
            <div className="mb"><label>Verba Flex Total (R$)</label><input type="number" step="0.01" placeholder="0,00" value={fv.verba} onChange={e=>setFv(f=>({...f,verba:e.target.value}))}/></div>
            <div style={{display:"flex",gap:10,marginTop:8}}>
              <button className="btn btn-red" style={{flex:1}} onClick={addVendedor}>{editV?"Salvar":"Cadastrar"}</button>
              <button className="btn-or" onClick={()=>setModalV(false)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {/* ── MODAL Lançamento ── */}
      {modalL&&(
        <div className="modal-backdrop" onClick={()=>setModalL(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-hdr">
              <div style={{width:40,height:40,background:fl.isCarne?"#fff3e0":"#ffebee",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>
                {fl.isCarne?"🥩":"🧾"}
              </div>
              <div className="modal-ttl">Novo Lançamento</div>
            </div>

            <div className="mb"><label>Vendedor</label>
              <select value={fl.vendedorId} onChange={e=>setFl(f=>({...f,vendedorId:e.target.value}))}>
                <option value="">Selecione o vendedor...</option>
                {vendedores.map(v=><option key={v.id} value={v.id}>{v.nome} — Saldo: {fmt(getSaldo(v.id))}</option>)}
              </select>
            </div>

            <div className="mb"><label>Selecionar do Catálogo</label>
              <select value={fl.itemId} onChange={e=>selectCat(e.target.value)}>
                <option value="">Escolher do catálogo...</option>
                {catalogo.filter(c=>!c.isCarne).map(c=><option key={c.id} value={c.id}>{c.nome} — {fmt(c.valor)}</option>)}
                <option disabled>──────────────</option>
                {catalogo.filter(c=>c.isCarne).map(c=><option key={c.id} value={c.id}>🥩 {c.nome} (valor variável)</option>)}
              </select>
            </div>

            {fl.isCarne&&(
              <div className="carne-alert">
                🥩 <span><strong>Bonificação em Carne</strong> — o valor é variável, informe o valor real desta bonificação abaixo.</span>
              </div>
            )}

            <div className="mb"><label>Nome do Produto</label>
              <input placeholder="Ou digite o nome manualmente" value={fl.itemNome} onChange={e=>setFl(f=>({...f,itemNome:e.target.value,itemId:""}))}/>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}} className="mb">
              <div><label>Quantidade</label><input type="number" min="1" value={fl.quantidade} onChange={e=>setFl(f=>({...f,quantidade:e.target.value}))}/></div>
              <div>
                <label>{fl.isCarne?"Valor Total (R$) *":"Valor Unitário (R$)"}</label>
                <input type="number" step="0.01" placeholder={fl.isCarne?"Informe o valor da carne...":"0,00"} value={fl.valor} onChange={e=>setFl(f=>({...f,valor:e.target.value}))} style={fl.isCarne?{borderColor:"#ffb74d",background:"#fffbf5"}:{}}/>
              </div>
            </div>

            {/* OBSERVAÇÃO */}
            <div className="mb">
              <label>Observação</label>
              <textarea
                placeholder="Ex: Bonificação para ação de marketing no Supermercado X — Churrasquinho do Dia das Mães..."
                value={fl.observacao}
                onChange={e=>setFl(f=>({...f,observacao:e.target.value}))}
              />
            </div>

            {fl.valor&&fl.quantidade&&(
              <div className="tot-prev">{fl.isCarne?"🥩 ":""}Total a descontar: {fmt(parseFloat(fl.valor||0)*parseInt(fl.quantidade||1))}</div>
            )}

            <div style={{display:"flex",gap:10}}>
              <button className="btn btn-red" style={{flex:1}} onClick={addLancamento}>Registrar Lançamento</button>
              <button className="btn-or" onClick={()=>setModalL(false)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {/* ── MODAL Histórico ── */}
      {modalH&&(
        <div className="modal-backdrop" onClick={()=>setModalH(null)}>
          <div className="modal" style={{maxWidth:580}} onClick={e=>e.stopPropagation()}>
            <div className="modal-hdr">
              <div style={{width:40,height:40,background:"#e3f2fd",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>◈</div>
              <div>
                <div className="modal-ttl">{modalH.nome}</div>
                <div style={{fontSize:11,color:"#888",textTransform:"uppercase",letterSpacing:".08em"}}>Histórico de Retiradas</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:18}}>
              {[
                {l:"Verba",  v:fmt(modalH.verba),                          c:"#006496",bg:"#e3f2fd"},
                {l:"Gasto",  v:fmt(getGasto(modalH.id)),                   c:"#D62734",bg:"#ffebee"},
                {l:"Carne",  v:fmt(lancamentos.filter(l=>l.vendedorId===modalH.id&&l.isCarne).reduce((a,l)=>a+l.valor*l.quantidade,0)), c:"#e65100",bg:"#fff3e0"},
                {l:"Saldo",  v:fmt(getSaldo(modalH.id)),                   c:getSaldo(modalH.id)<0?"#D62734":"#2e7d32",bg:getSaldo(modalH.id)<0?"#ffebee":"#e8f5e9"},
              ].map(s=>(
                <div key={s.l} style={{background:s.bg,borderRadius:8,padding:"10px 12px",textAlign:"center"}}>
                  <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".12em",color:"#888",marginBottom:3}}>{s.l}</div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:17,fontWeight:800,color:s.c}}>{s.v}</div>
                </div>
              ))}
            </div>
            <div style={{height:1,background:"#eee",margin:"0 0 12px"}}/>
            <div style={{maxHeight:340,overflowY:"auto"}}>
              {lancamentos.filter(l=>l.vendedorId===modalH.id).length===0
                ? <div style={{color:"#bbb",fontSize:13,padding:"24px 0",textAlign:"center"}}>Nenhum lançamento.</div>
                : [...lancamentos].filter(l=>l.vendedorId===modalH.id).reverse().map(lanc=>(
                  <div key={lanc.id} className={"h-row"+(lanc.isCarne?" carne":"")}>
                    <div style={{fontSize:18,flexShrink:0}}>{lanc.isCarne?"🥩":"🧾"}</div>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:16,textTransform:"uppercase"}}>{lanc.itemNome}</div>
                      <div style={{fontSize:11,color:"#999"}}>{fmtDate(lanc.data)} · {lanc.quantidade}x · {fmt(lanc.valor)}/un</div>
                      {lanc.observacao&&<div className="obs-box">📝 {lanc.observacao}</div>}
                    </div>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:18,color:lanc.isCarne?"#e65100":"#D62734",flexShrink:0}}>− {fmt(lanc.valor*lanc.quantidade)}</div>
                  </div>
                ))
              }
            </div>
            <button className="btn-ob" style={{marginTop:20,width:"100%"}} onClick={()=>setModalH(null)}>Fechar</button>
          </div>
        </div>
      )}

      {/* ── MODAL Confirmação ── */}
      {delConf&&(
        <div className="modal-backdrop" onClick={()=>setDelConf(null)}>
          <div className="modal" style={{maxWidth:400}} onClick={e=>e.stopPropagation()}>
            <div className="modal-hdr">
              <div style={{width:40,height:40,background:"#ffebee",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>⚠️</div>
              <div className="modal-ttl" style={{color:"#D62734"}}>Confirmar Exclusão</div>
            </div>
            <p style={{fontSize:14,color:"#555",marginBottom:24,lineHeight:1.6}}>
              Excluir <strong style={{color:"#1a1a1a"}}>{delConf.label}</strong>?
              {delConf.type==="vendedor"&&<><br/><span style={{color:"#D62734",fontSize:12}}>Os lançamentos serão mantidos.</span></>}
            </p>
            <div style={{display:"flex",gap:10}}>
              <button className="btn btn-red" style={{flex:1}} onClick={doDelete}>Sim, Excluir</button>
              <button className="btn-or" style={{flex:1}} onClick={()=>setDelConf(null)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
